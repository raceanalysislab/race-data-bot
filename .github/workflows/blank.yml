name: Fetch Race Data

on:
  schedule:
    - cron: "*/10 * * * *"   # 10分ごとに実行
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch source page
        run: |
          curl -L "https://www1.mbrace.or.jp/od2/B/dindex.html" -o data/source.html

      - name: Commit fetched data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/source.html || true
          git commit -m "auto: fetch race data" || echo "No changes"
          git push