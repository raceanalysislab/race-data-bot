name: Build K ST Index

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build k st index
        run: |
          python scripts/build_k_st_index.py

      - name: Commit k st index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master/k_st_index.json
          git commit -m "Build k st index" || echo "No changes"
          git push