name: Build Event Grade Candidates

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run grade candidate builder
        run: |
          python scripts/build_event_grade_candidates.py

      - name: Commit generated grade candidates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/event_grade_candidates.json

          git commit -m "build: event grade candidates" || echo "no changes"

          git push