name: Build Course Stats

on:
  workflow_run:
    workflows: ["Fetch K Results"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # 毎日12:00 JST

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run course stats build
        run: |
          python scripts/build_course_stats_from_k.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/player_course_stats.json
          git commit -m "update player course stats" || echo "no changes"
          git push