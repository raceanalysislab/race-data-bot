name: Build Course Stats

on:
  workflow_run:
    workflows: ["Fetch K Results"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # 毎日12:00 JST

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run course stats build
        run: |
          python scripts/build_course_stats_from_k.py

      - name: Run other boat trends build
        run: |
          python scripts/build_other_boat_trends_from_k.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/player_course_stats_all.json \
            data/player_course_stats_1y.json \
            data/player_course_stats_3y.json \
            data/player_other_boat_trends_1y.json \
            data/player_other_boat_trends_3y.json

          git diff --cached --quiet && echo "no changes" && exit 0

          git commit -m "update player course stats and other boat trends"
          git push