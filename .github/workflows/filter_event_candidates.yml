name: Filter Event Candidates

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run filter script
        run: |
          python scripts/filter_event_candidates.py

      - name: Commit filtered candidates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/k_event_title_candidates_filtered.json

          git commit -m "build: filtered event candidates" || echo "no changes"

          git push