name: Build Meet Avg ST

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Fetch K Results"]
    types:
      - completed
  schedule:
    - cron: "10 3 * * *"   # 毎日12:10 JST

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build meet avg st
        run: |
          python scripts/build_meet_avg_st_from_k.py

      - name: Check generated files
        run: |
          ls -la data || true
          ls -la data/meet_avg_st || true

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/meet_avg_st
          git commit -m "update meet avg st" || echo "no changes"
          git push