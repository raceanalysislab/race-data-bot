name: Download Racer Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa p7zip-full

      - name: Download racer master
        run: |
          curl -L "https://www.boatrace.jp/owpc/pc/extra/data/racer/fan2510.lzh" -o fan2510.lzh

      - name: Extract LZH
        run: |
          7z x fan2510.lzh
          ls -la