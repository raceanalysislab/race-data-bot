name: Download Racer Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download racer master
        run: |
          curl -L "https://www.boatrace.jp/owpc/pc/extra/data/racer/fan2510.lzh" -o fan2510.lzh

      - name: Inspect downloaded file
        run: |
          ls -lh fan2510.lzh
          file fan2510.lzh || true
          head -n 20 fan2510.lzh || true