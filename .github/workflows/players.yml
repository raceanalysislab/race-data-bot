name: Update k results

on:
  schedule:
    - cron: "0 3 * * *"    # 毎日 12:00 JST
    - cron: "0 12 * * *"   # 毎日 21:00 JST
    - cron: "0 13 * * *"   # 毎日 22:00 JST
    - cron: "0 14 * * *"   # 毎日 23:00 JST
    - cron: "10 15 * * *"  # 毎日 00:10 JST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Install lhasa
        run: sudo apt-get update && sudo apt-get install -y lhasa

      - name: Run k results fetch
        run: python scripts/fetch_k_results.py

      - name: Parse races
        run: python scripts/parse_mbrace_txt.py

      - name: Build race json
        run: python scripts/build_race_json.py

      - name: Build site json
        run: python scripts/build_site_json.py

      - name: Build player index
        run: python scripts/build_player_index.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "update k results" || echo "no changes"
          git push