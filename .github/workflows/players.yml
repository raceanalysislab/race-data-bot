name: Update k results

on:
  schedule:
    - cron: "0 3 * * *"    # 毎日 12:00 JST
    - cron: "0 12 * * *"   # 毎日 21:00 JST
    - cron: "0 13 * * *"   # 毎日 22:00 JST
    - cron: "0 14 * * *"   # 毎日 23:00 JST
    - cron: "10 15 * * *"  # 毎日 00:10 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Install lhasa
        run: sudo apt-get update && sudo apt-get install -y lhasa

      - name: Run k results fetch
        run: python scripts/fetch_k_results.py

      - name: Parse k results txt
        run: python scripts/parse_k_results_txt.py

      - name: Check after parse
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== data files ==="
          ls -la data || true
          find data -maxdepth 3 -type f | sort || true
          echo "=== k_results_parsed preview ==="
          python - <<'PY'
          import json
          path = "data/k_results_parsed.json"
          try:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              venues = data.get("venues", [])
              print("venues:", len(venues))
              if venues:
                  print("first:", venues[0].get("date"), venues[0].get("jcd"), venues[0].get("venue"))
                  print("last:", venues[-1].get("date"), venues[-1].get("jcd"), venues[-1].get("venue"))
          except Exception as e:
              print("preview error:", e)
          PY

      - name: Build race json
        run: python scripts/build_race_json.py

      - name: Build site json
        run: python scripts/build_site_json.py

      - name: Check site json outputs
        run: |
          echo "=== site files ==="
          ls -la data/site || true
          find data/site -maxdepth 3 -type f | sort || true
          echo "=== venues_today preview ==="
          head -n 40 data/site/venues_today.json || true
          echo "=== git status before commit ==="
          git status --short

      - name: Build player index
        run: python scripts/build_player_index.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git status --short
          git commit -m "update k results" || echo "no changes"
          git push