name: Update k results

on:
  schedule:
    - cron: "0 3 * * *"   # 毎日 12:00 JST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Install lhasa
        run: sudo apt-get update && sudo apt-get install -y lhasa

      - name: Run k results fetch
        run: python scripts/fetch_k_results.py

      - name: Commit extracted k files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/download_k data/extract_k
          git commit -m "update k results" || echo "no changes"
          git push