name: Build advanced player stats

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Build advanced player stats
        run: |
          python scripts/build_advanced_player_stats.py

      - name: Commit results
        run: |
          git config user.name "race-data-bot"
          git config user.email "bot@github.local"

          git add data/master/advanced_player_stats.json || true
          git commit -m "auto: update advanced player stats" || echo "No changes"

          git push