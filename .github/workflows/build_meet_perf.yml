name: Build Meet Perf

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: write

concurrency:
  group: build-meet-perf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare directories
        run: |
          mkdir -p data/meet_perf

      - name: Run build_meet_perf_from_k_results
        run: |
          python scripts/build_meet_perf_from_k_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/meet_perf

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Build meet perf (from k results)"
          git push