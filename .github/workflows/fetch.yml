name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # 5分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false  # キャンセルしない（キューに溜める）

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ✅ mainへ同期（ここは残す）
      - name: Sync with origin/main
        run: |
          git fetch origin main
          git rebase origin/main || (git rebase --abort && git reset --hard origin/main)

      # ✅ 取得（失敗したら落とす）
      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      # ✅ 変更が無い時はコミットしない
      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"

      # ✅ push安定化：競合したら pull --rebase して数回リトライ（scheduleで止まりにくくする）
      - name: Push to main (retry)
        run: |
          set -e

          # すでに「No changes」でexitしてたらここには来ない
          for i in 1 2 3; do
            echo "Push attempt $i..."

            # 最新に追従してからpush
            git fetch origin main
            git pull --rebase origin main || (git rebase --abort && git reset --hard origin/main)

            if git push origin HEAD:main; then
              echo "Push success"
              exit 0
            fi

            echo "Push failed. retrying..."
            sleep 2
          done

          echo "Push failed after retries"
          exit 1

      # ✅ 失敗時だけデバッグ吐く
      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore