name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🔥 fetch前に最新へ同期（push競合防止・安定版）
      - name: Sync with origin/main
        run: |
          git fetch origin main
          git rebase origin/main || (git rebase --abort && git reset --hard origin/main)

      - name: Fetch source page and build json
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/fetch_mbrace.py

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"

          # pushが競合したら1回だけ同期して再push（rebase失敗時はabortしてorigin/mainへ合わせる）
          git push origin HEAD:main || (
            git fetch origin main &&
            git rebase origin/main || (git rebase --abort && git reset --hard origin/main) &&
            git push origin HEAD:main
          )