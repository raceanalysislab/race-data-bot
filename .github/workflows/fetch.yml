name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ✅ 追加：開催場/締切（boatrace.jp）を更新
      - name: Fetch today venues (boatrace)
        run: |
          python scripts/fetch_today.py

      - name: Fetch mbrace (download/extract)
        run: |
          python scripts/fetch_mbrace.py

      - name: Parse mbrace txt -> json
        run: |
          python scripts/parse_mbrace_txt.py

      - name: Show parsed json (quick debug)
        run: |
          ls -la data || true
          ls -la data/extract || true
          head -n 40 data/venues_today.json || true
          head -n 40 data/mbrace_races_today.json || true

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          # data/ 配下をまるごと確実に拾う
          git add -A data || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore