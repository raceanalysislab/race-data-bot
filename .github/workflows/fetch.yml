name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Sync with origin/main
        run: |
          git pull --rebase --autostash origin main

      # ✅ JSTで動かす（時間帯反映）
      - name: Set timezone to JST
        run: |
          sudo timedatectl set-timezone Asia/Tokyo
          date

      - name: Fetch source page and build json
        env:
          PYTHONUNBUFFERED: "1"
          TZ: "Asia/Tokyo"     # ✅ Python側にも明示
        run: |
          python scripts/fetch_mbrace.py

      # 失敗したらログ類を保存（あとで原因追える）
      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore

      - name: Commit fetched data
        env:
          TZ: "Asia/Tokyo"     # ✅ commitメッセージの時刻もJSTに
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main