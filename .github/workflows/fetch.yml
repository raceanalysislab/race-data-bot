name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *" # 10分おき（毎時ちょうどを避ける）

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch today venues (boatrace)
        run: |
          python scripts/fetch_today.py

      - name: Fetch mbrace (download/extract)
        run: |
          python scripts/fetch_mbrace.py

      - name: Fetch K results
        run: |
          python scripts/fetch_k_results.py

      - name: Check extracted mbrace txt
        id: check_mbrace
        run: |
          latest_txt="$(find data/extract -maxdepth 1 -type f -name 'b*.txt' | sort | tail -n 1)"
          if [ -z "$latest_txt" ]; then
            echo "mbrace_ready=false" >> "$GITHUB_OUTPUT"
            echo "No extracted mbrace txt yet. Skip downstream steps."
          else
            echo "mbrace_ready=true" >> "$GITHUB_OUTPUT"
            echo "latest_txt=$latest_txt" >> "$GITHUB_OUTPUT"
            echo "Found extracted txt: $latest_txt"
          fi

      - name: Build event master candidates
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          python scripts/build_event_master_candidates.py

      - name: Build event master
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          python scripts/build_event_master.py

      - name: Parse mbrace txt -> json
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          python scripts/parse_mbrace_txt.py

      - name: Check parsed mbrace json
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          ls -la data/mbrace_races_*.json

      - name: Build site json
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          python scripts/build_site_json.py

      - name: Build race json
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          python scripts/build_race_json.py

      - name: Show outputs (quick debug)
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          echo "----- data -----"
          ls -la data || true

          echo "----- event master manual -----"
          ls -la data/event_master_manual.json || true

          echo "----- event master candidates -----"
          ls -la data/event_master_candidates.json || true

          echo "----- event master -----"
          ls -la data/event_master.json || true

          echo "----- parsed mbrace json -----"
          ls -la data/mbrace_races_*.json || true

          echo "----- data/site -----"
          ls -la data/site || true

          echo "----- data/site/venues -----"
          ls -la data/site/venues || true

          echo "----- data/site/races -----"
          ls -la data/site/races || true

          echo "----- data/download_k -----"
          ls -la data/download_k || true

          echo "----- data/extract_k -----"
          ls -la data/extract_k || true

          echo "----- site venues dir -----"
          find data/site/venues -maxdepth 1 -type f | sort || true

          echo "----- site races dir -----"
          find data/site/races -maxdepth 2 -type f | sort | head -n 200 || true

      - name: Commit fetched data to bot repo
        if: steps.check_mbrace.outputs.mbrace_ready == 'true'
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A data || true

          if git diff --cached --quiet; then
            echo "No changes in bot repo"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"

          git push origin HEAD:main --force

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore