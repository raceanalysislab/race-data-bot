name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      # 🔥 fetch前に最新へ同期（これ超重要）
      - name: Sync with origin/main
        run: |
          git pull --rebase --autostash origin main

      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          # 生成物を全部add（存在しないものは無視）
          git add data/*.json data/*.html data/*.txt 2>/dev/null || true

          # 差分チェック（なければ終了）
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main