name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/1 * * * *" # 1分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ✅ push競合防止：先にmainへ同期
      - name: Sync with origin/main
        run: |
          git fetch origin main
          git rebase origin/main || (git rebase --abort && git reset --hard origin/main)

      # ✅ 取得（失敗したら落とす）
      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      # ✅ 変更が無い時はコミットしない（毎分でも履歴が増えない）
      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"

          # push競合したら1回だけ同期して再push
          git push origin HEAD:main || (
            git fetch origin main &&
            git rebase origin/main || (git rebase --abort && git reset --hard origin/main) &&
            git push origin HEAD:main
          )

      # ✅ 失敗時だけデバッグ吐く（毎分でも容量を食わない）
      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore