name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch today venues (boatrace)
        run: |
          python scripts/fetch_today.py

      - name: Fetch mbrace (download/extract)
        run: |
          python scripts/fetch_mbrace.py

      - name: Parse mbrace txt -> json
        run: |
          python scripts/parse_mbrace_txt.py

      - name: Build site json
        run: |
          test -f data/mbrace_races_today.json
          python scripts/build_site_json.py

      - name: Build race json
        run: |
          python scripts/build_race_json.py

      - name: Show outputs (quick debug)
        run: |
          echo "----- data -----"
          ls -la data || true

          echo "----- data/site -----"
          ls -la data/site || true

          echo "----- data/site/venues -----"
          ls -la data/site/venues || true

          echo "----- data/site/races -----"
          ls -la data/site/races || true

          echo "----- site venues.json (head) -----"
          head -n 60 data/site/venues.json || true

          echo "----- mbrace_races_today.json (head) -----"
          head -n 30 data/mbrace_races_today.json || true

      - name: Commit fetched data to bot repo
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A data || true

          if git diff --cached --quiet; then
            echo "No changes in bot repo"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore