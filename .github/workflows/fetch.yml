name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"   # 10分おき（最初は軽め推奨）

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/source.html data/today.json data/venues_today.json data/picks_today.json || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update race data"
          git push