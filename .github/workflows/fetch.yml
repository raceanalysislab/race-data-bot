name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout bot repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 開催場/締切（boatrace.jp）
      - name: Fetch today venues (boatrace)
        run: |
          python scripts/fetch_today.py

      # mbrace（lzh download + extract）
      - name: Fetch mbrace (download/extract)
        run: |
          python scripts/fetch_mbrace.py

      # mbrace txt -> json
      - name: Parse mbrace txt -> json
        run: |
          python scripts/parse_mbrace_txt.py

      # サイト用 会場JSON生成
      - name: Build site json
        run: |
          test -f data/mbrace_races_today.json
          python scripts/build_site_json.py

      # レースJSON生成
      - name: Build race json
        run: |
          python scripts/build_race_json.py

      - name: Show outputs (quick debug)
        run: |
          echo "----- data -----"
          ls -la data || true

          echo "----- data/site -----"
          ls -la data/site || true

          echo "----- data/site/venues -----"
          ls -la data/site/venues || true

          echo "----- data/site/races -----"
          ls -la data/site/races || true

          echo "----- site venues.json (head) -----"
          head -n 60 data/site/venues.json || true

          echo "----- mbrace_races_today.json (head) -----"
          head -n 30 data/mbrace_races_today.json || true

      - name: Commit fetched data to bot repo
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A data || true

          if git diff --cached --quiet; then
            echo "No changes in bot repo"
          else
            git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # ===== analysis側へ自動同期 =====
      - name: Checkout analysis repo
        uses: actions/checkout@v4
        with:
          repository: raceanalysislab/race-analysis
          token: ${{ secrets.REPO_SYNC_TOKEN }}
          path: analysis_repo
          fetch-depth: 0

      - name: Sync site data to analysis repo
        run: |
          mkdir -p analysis_repo/data/site
          rm -rf analysis_repo/data/site/venues
          rm -rf analysis_repo/data/site/races

          cp -f data/site/venues.json analysis_repo/data/site/venues.json

          if [ -d data/site/venues ]; then
            mkdir -p analysis_repo/data/site/venues
            cp -R data/site/venues/. analysis_repo/data/site/venues/
          fi

          if [ -d data/site/races ]; then
            mkdir -p analysis_repo/data/site/races
            cp -R data/site/races/. analysis_repo/data/site/races/
          fi

          echo "----- analysis_repo/data/site -----"
          ls -la analysis_repo/data/site || true

          echo "----- synced venues.json (head) -----"
          head -n 60 analysis_repo/data/site/venues.json || true

      - name: Commit synced data to analysis repo
        working-directory: analysis_repo
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/site

          if git diff --cached --quiet; then
            echo "No changes in analysis repo"
            exit 0
          fi

          git commit -m "Sync site data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            analysis_repo/data/**
            **/*.log
          if-no-files-found: ignore