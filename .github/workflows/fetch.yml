　name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # 10分おき

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          # 生成物（必要なものだけ add）
          git add data/source.html data/today.json data/venues_today.json data/picks_today.json data/pro_key.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data"

          # ここが重要：他の更新があってもズレないように整列してからpush
          git pull --rebase origin main
          git push origin HEAD:main