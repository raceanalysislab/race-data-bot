name: Fetch Race Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *" # 10分おき（実行6分前後ならこれが安定）

permissions:
  contents: write

concurrency:
  group: fetch-race-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lzh extractor
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync with origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Fetch source page and build json
        run: |
          python scripts/fetch_mbrace.py

      - name: Commit fetched data
        run: |
          git config user.name "race-data-bot"
          git config user.email "actions@users.noreply.github.com"

          git add data/* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update race data $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            data/**
            **/*.log
          if-no-files-found: ignore