name: Build Race JSON

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build race json
        run: |
          python scripts/build_race_json.py

      - name: Commit race json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/site/races
          git commit -m "build race json" || echo "no change"
          git push