name: Build Race JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse mbrace txt
        run: |
          python scripts/parse_mbrace_txt.py

      - name: Run build race json
        run: |
          python scripts/build_race_json.py

      - name: Build site json
        run: |
          python scripts/build_site_json.py

      - name: Commit generated site json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data
          git commit -m "build race json" || echo "no change"
          git push